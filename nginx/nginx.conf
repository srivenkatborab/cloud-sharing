# Nginx reverse proxy configuration for CloudShare.
#
# Routes:
#   /api/*  → FastAPI backend  (port 8000)
#   /*      → Next.js frontend (port 3000)
#
# Copy this file to /etc/nginx/sites-available/default on the EC2 instance,
# then run: sudo systemctl restart nginx

server {
    listen 80;
    server_name _;  # Accept requests on any hostname / IP

    client_max_body_size 110M;  # Allow uploads up to 100 MB + overhead

    # Proxy /api/* to the FastAPI (Uvicorn) process
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy everything else to the Next.js process
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
